<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ConnectTheWord By Datorg</title>

    <meta property="og:title" content="ConnectTheWord By Datorg" />
    <meta property="og:description" content="Can you solve all 10 word connection levels? Play now!" />
    <meta property="og:image" content="https://chatgpt.com/backend-api/estuary/content?id=file_000000001f2071f88d23ae6c8959761b&ts=495241&p=fs&cid=1&sig=bc31c6bbb6320bdbdd158164a6c91e2af80e34c0d45dbadc6fa528156b716f0d&v=0" />
    <meta property="og:type" content="website" />

    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #2b5876, #4e4376);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        header {
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 1px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #level-indicator {
            font-size: 16px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 14px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 8px;
            color: #ffeb3b;
        }
        #current-word {
            height: 40px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 20px;
            border-radius: 20px;
            margin: 15px auto 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            max-width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #grid-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 10px;
        }
        #crossword {
            display: grid;
            gap: 6px;
            background: rgba(0, 0, 0, 0.15);
            padding: 12px;
            border-radius: 10px;
        }
        .cell {
            width: 42px;
            height: 42px;
            background: transparent;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            transition: all 0.3s ease;
        }
        .cell.active {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .cell.solved {
            background: #ffeb3b;
            color: #333;
            border: none;
            animation: pop 0.3s ease;
        }
        #wheel-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            pointer-events: none;
        }
        #wheel {
            position: relative;
            width: 220px;
            height: 220px;
            background: rgba(255, 255, 255, 0.15);
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 2;
            touch-action: none;
            cursor: pointer;
        }
        .letter-node {
            position: absolute;
            width: 50px;
            height: 50px;
            background: white;
            color: #4e4376;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, background 0.1s ease;
            pointer-events: none;
        }
        .letter-node.selected {
            background: #ffeb3b;
            color: #333;
            transform: translate(-50%, -50%) scale(1.2);
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>ConnectTheWord</h1>
        <div class="subtitle">By Datorg</div>
        <div id="level-indicator">Level 1</div>
        <div id="current-word"></div>
    </header>

    <div id="grid-container">
        <div id="crossword"></div>
    </div>

    <div id="wheel-container">
        <canvas id="canvas"></canvas>
        <div id="wheel"></div>
    </div>

    <script>
        // --- 10 DYNAMIC LEVELS DATABASE ---
        const gameLevels = [
            {
                levelNum: 1,
                letters: ['C', 'A', 'T', 'O'],
                gridSize: 5,
                boardWords: [
                    { word: "COAT", cells: [{r:1, c:0}, {r:2, c:0}, {r:3, c:0}, {r:4, c:0}] },
                    { word: "TACO", cells: [{r:4, c:0}, {r:4, c:1}, {r:4, c:2}, {r:4, c:3}] },
                    { word: "CAT",  cells: [{r:4, c:2}, {r:3, c:2}, {r:2, c:2}] },
                    { word: "ACT",  cells: [{r:2, c:2}, {r:2, c:3}, {r:2, c:4}] }
                ]
            },
            {
                levelNum: 2,
                letters: ['E', 'A', 'R', 'T'],
                gridSize: 5,
                boardWords: [
                    { word: "TEAR", cells: [{r:0, c:1}, {r:1, c:1}, {r:2, c:1}, {r:3, c:1}] },
                    { word: "RATE", cells: [{r:2, c:0}, {r:2, c:1}, {r:2, c:2}, {r:2, c:3}] },
                    { word: "ART",  cells: [{r:2, c:3}, {r:3, c:3}, {r:4, c:3}] },
                    { word: "EAR",  cells: [{r:0, c:1}, {r:0, c:2}, {r:0, c:3}] }
                ]
            },
            {
                levelNum: 3,
                letters: ['L', 'I', 'V', 'E'],
                gridSize: 5,
                boardWords: [
                    { word: "LIVE", cells: [{r:1, c:1}, {r:1, c:2}, {r:1, c:3}, {r:1, c:4}] },
                    { word: "EVIL", cells: [{r:0, c:3}, {r:1, c:3}, {r:2, c:3}, {r:3, c:3}] },
                    { word: "VEIL", cells: [{r:3, c:0}, {r:3, c:1}, {r:3, c:2}, {r:3, c:3}] },
                    { word: "LIE",  cells: [{r:1, c:1}, {r:2, c:1}, {r:3, c:1}] }
                ]
            },
            {
                levelNum: 4,
                letters: ['S', 'T', 'O', 'P'],
                gridSize: 5,
                boardWords: [
                    { word: "STOP", cells: [{r:0, c:2}, {r:1, c:2}, {r:2, c:2}, {r:3, c:2}] },
                    { word: "POST", cells: [{r:2, c:0}, {r:2, c:1}, {r:2, c:2}, {r:2, c:3}] },
                    { word: "POTS", cells: [{r:0, c:4}, {r:1, c:4}, {r:2, c:4}, {r:3, c:4}] },
                    { word: "TOP",  cells: [{r:2, c:1}, {r:3, c:1}, {r:4, c:1}] }
                ]
            },
            {
                levelNum: 5,
                letters: ['C', 'A', 'M', 'P'],
                gridSize: 5,
                boardWords: [
                    { word: "CAMP", cells: [{r:1, c:0}, {r:1, c:1}, {r:1, c:2}, {r:1, c:3}] },
                    { word: "MAP",  cells: [{r:1, c:2}, {r:2, c:2}, {r:3, c:2}] },
                    { word: "CAP",  cells: [{r:1, c:0}, {r:2, c:0}, {r:3, c:0}] },
                    { word: "AMP",  cells: [{r:3, c:0}, {r:3, c:1}, {r:3, c:2}] }
                ]
            },
            {
                levelNum: 6,
                letters: ['B', 'A', 'K', 'E'],
                gridSize: 5,
                boardWords: [
                    { word: "BAKE", cells: [{r:0, c:1}, {r:1, c:1}, {r:2, c:1}, {r:3, c:1}] },
                    { word: "BEAK", cells: [{r:0, c:1}, {r:0, c:2}, {r:0, c:3}, {r:0, c:4}] },
                    { word: "BARK", cells: [{r:0, c:4}, {r:1, c:4}, {r:2, c:4}, {r:3, c:4}] },
                    { word: "CAB",  cells: [{r:2, c:0}, {r:2, c:1}, {r:2, c:2}] } 
                ]
            },
            {
                levelNum: 7,
                letters: ['L', 'A', 'M', 'P'],
                gridSize: 5,
                boardWords: [
                    { word: "LAMP", cells: [{r:0, c:2}, {r:1, c:2}, {r:2, c:2}, {r:3, c:2}] },
                    { word: "PALM", cells: [{r:2, c:0}, {r:2, c:1}, {r:2, c:2}, {r:2, c:3}] },
                    { word: "MAP",  cells: [{r:2, c:3}, {r:3, c:3}, {r:4, c:3}] },
                    { word: "LAP",  cells: [{r:0, c:2}, {r:0, c:3}, {r:0, c:4}] }
                ]
            },
            {
                levelNum: 8,
                letters: ['N', 'O', 'T', 'E'],
                gridSize: 5,
                boardWords: [
                    { word: "NOTE", cells: [{r:1, c:1}, {r:1, c:2}, {r:1, c:3}, {r:1, c:4}] },
                    { word: "TONE", cells: [{r:0, c:3}, {r:1, c:3}, {r:2, c:3}, {r:3, c:3}] },
                    { word: "NET",  cells: [{r:1, c:1}, {r:2, c:1}, {r:3, c:1}] },
                    { word: "TEN",  cells: [{r:3, c:1}, {r:3, c:2}, {r:3, c:3}] }
                ]
            },
            {
                levelNum: 9,
                letters: ['F', 'L', 'O', 'W'],
                gridSize: 5,
                boardWords: [
                    { word: "FLOW", cells: [{r:0, c:1}, {r:1, c:1}, {r:2, c:1}, {r:3, c:1}] },
                    { word: "WOLF", cells: [{r:2, c:0}, {r:2, c:1}, {r:2, c:2}, {r:2, c:3}] },
                    { word: "FOWL", cells: [{r:0, c:1}, {r:0, c:2}, {r:0, c:3}, {r:0, c:4}] },
                    { word: "LOW",  cells: [{r:2, c:3}, {r:3, c:3}, {r:4, c:3}] }
                ]
            },
            {
                levelNum: 10,
                letters: ['D', 'E', 'A', 'R'],
                gridSize: 6,
                boardWords: [
                    { word: "DEAR", cells: [{r:1, c:1}, {r:1, c:2}, {r:1, c:3}, {r:1, c:4}] },
                    { word: "READ", cells: [{r:0, c:4}, {r:1, c:4}, {r:2, c:4}, {r:3, c:4}] },
                    { word: "DARE", cells: [{r:1, c:1}, {r:2, c:1}, {r:3, c:1}, {r:4, c:1}] },
                    { word: "RED",  cells: [{r:3, c:1}, {r:3, c:2}, {r:3, c:3}] },
                    { word: "EAR",  cells: [{r:1, c:2}, {r:2, c:2}, {r:3, c:2}] }
                ]
            }
        ];

        // --- TRACKING PROGRESSION ---
        let currentLevelIndex = 0;
        
        const savedLevel = localStorage.getItem('datorg_connect_word_level');
        if (savedLevel && parseInt(savedLevel) <= gameLevels.length) {
            currentLevelIndex = parseInt(savedLevel) - 1;
        }

        let currentLevel = gameLevels[currentLevelIndex];
        let solvedWords = [];
        let selectedNodes = [];
        let isDrawing = false;
        let currentTouchPos = { x: 0, y: 0 };
        let gridCells = {};
        const nodes = [];

        // --- DOM ELEMENTS ---
        const crossword = document.getElementById('crossword');
        const wheel = document.getElementById('wheel');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const currentWordDisplay = document.getElementById('current-word');
        const levelIndicator = document.getElementById('level-indicator');

        // --- GENERATE BOARD CONTROLLER ---
        function initLevel() {
            currentLevel = gameLevels[currentLevelIndex];
            solvedWords = [];
            gridCells = {};
            
            levelIndicator.innerText = `Level ${currentLevel.levelNum}`;
            currentWordDisplay.innerText = "";
            
            crossword.innerHTML = '';
            crossword.style.gridTemplateColumns = `repeat(${currentLevel.gridSize}, 42px)`;
            crossword.style.gridTemplateRows = `repeat(${currentLevel.gridSize}, 42px)`;

            for (let r = 0; r < currentLevel.gridSize; r++) {
                for (let c = 0; c < currentLevel.gridSize; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    crossword.appendChild(cell);
                    gridCells[`${r},${c}`] = cell;
                }
            }

            currentLevel.boardWords.forEach(w => {
                w.cells.forEach(coord => {
                    if(gridCells[`${coord.r},${coord.c}`]) {
                        gridCells[`${coord.r},${coord.c}`].classList.add('active');
                    }
                });
            });

            wheel.innerHTML = '';
            nodes.length = 0; 
            const centerX = 110;
            const centerY = 110;
            const radius = 75;

            currentLevel.letters.forEach((letter, index) => {
                const angle = (index * 2 * Math.PI) / currentLevel.letters.length - Math.PI / 2;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                const node = document.createElement('div');
                node.classList.add('letter-node');
                node.innerText = letter;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                wheel.appendChild(node);

                nodes.push({ element: node, letter: letter, x: x, y: y });
            });

            resizeCanvas();
        }

        function resizeCanvas() {
            canvas.width = wheel.offsetWidth + 80;
            canvas.height = wheel.offsetHeight + 80;
        }
        window.addEventListener('resize', resizeCanvas);

        // --- INPUT ROUTING (TOUCH & MOUSE COMPATIBILITY) ---
        wheel.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            handleMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        window.addEventListener('touchend', () => { handleEnd(); });

        wheel.addEventListener('mousedown', (e) => {
            e.preventDefault();
            handleStart(e.clientX, e.clientY);
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            handleMove(e.clientX, e.clientY);
        });

        window.addEventListener('mouseup', () => { handleEnd(); });

        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function handleStart(clientX, clientY) {
            isDrawing = true;
            checkCollision(clientX, clientY);
        }

        function handleMove(clientX, clientY) {
            currentTouchPos = getCanvasCoords(clientX, clientY);
            checkCollision(clientX, clientY);
            drawLines();
        }

        function handleEnd() {
            if (!isDrawing) return;
            isDrawing = false;

            const finalWord = selectedNodes.map(n => n.letter).join('');
            checkWordSubmit(finalWord);

            selectedNodes.forEach(n => n.element.classList.remove('selected'));
            selectedNodes = [];
            currentWordDisplay.innerText = "";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function checkCollision(clientX, clientY) {
            const wheelRect = wheel.getBoundingClientRect();
            const localX = clientX - wheelRect.left;
            const localY = clientY - wheelRect.top;

            nodes.forEach(node => {
                const dist = Math.hypot(node.x - localX, node.y - localY);
                if (dist < 28 && !selectedNodes.includes(node)) {
                    selectedNodes.push(node);
                    node.element.classList.add('selected');
                    currentWordDisplay.innerText = selectedNodes.map(n => n.letter).join('');
                    if (navigator.vibrate) navigator.vibrate(15);
                }
            });
        }

        function drawLines() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (selectedNodes.length === 0) return;

            const canvasRect = canvas.getBoundingClientRect();
            const wheelRect = wheel.getBoundingClientRect();
            const offsetX = wheelRect.left - canvasRect.left;
            const offsetY = wheelRect.top - canvasRect.top;

            ctx.lineWidth = 10;
            ctx.strokeStyle = "rgba(255, 235, 59, 0.8)";
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            ctx.beginPath();
            selectedNodes.forEach((node, idx) => {
                const nx = node.x + offsetX;
                const ny = node.y + offsetY;
                if (idx === 0) ctx.moveTo(nx, ny);
                else ctx.lineTo(nx, ny);
            });

            if (isDrawing && selectedNodes.length > 0) {
                ctx.lineTo(currentTouchPos.x, currentTouchPos.y);
            }
            ctx.stroke();
        }

        function checkWordSubmit(word) {
            const match = currentLevel.boardWords.find(w => w.word === word);
            
            if (match && !solvedWords.includes(word)) {
                solvedWords.push(word);
                match.cells.forEach((coord, index) => {
                    setTimeout(() => {
                        const cell = gridCells[`${coord.r},${coord.c}`];
                        if(cell) {
                            cell.innerText = word[index];
                            cell.classList.add('solved');
                        }
                    }, index * 80);
                });

                if (solvedWords.length === currentLevel.boardWords.length) {
                    setTimeout(() => {
                        if (currentLevelIndex < gameLevels.length - 1) {
                            alert("Level Complete! 🎉 Proceeding to next round.");
                            currentLevelIndex++;
                            localStorage.setItem('datorg_connect_word_level', currentLevelIndex + 1);
                            initLevel();
                        } else {
                            alert("Mastery Attained! You finished all 10 levels of ConnectTheWord! 🏆");
                            currentLevelIndex = 0;
                            localStorage.setItem('datorg_connect_word_level', 1);
                            initLevel();
                        }
                    }, 800);
                }
            }
        }

        initLevel();
    </script>
</body>
</html>
