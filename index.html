<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ConnectTheWord By Datorg</title>

    <meta property="og:title" content="ConnectTheWord By Datorg" />
    <meta property="og:description" content="Can you solve all 10 word connection levels? Play now!" />
    <meta property="og:image" content="https://chatgpt.com/backend-api/estuary/content?id=file_000000001f2071f88d23ae6c8959761b&ts=495241&p=fs&cid=1&sig=bc31c6bbb6320bdbdd158164a6c91e2af80e34c0d45dbadc6fa528156b716f0d&v=0" />
    <meta property="og:type" content="website" />

    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #2b5876, #4e4376);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        header {
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 1px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #level-indicator {
            font-size: 16px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 14px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 8px;
            color: #ffeb3b;
        }
        #current-word {
            height: 40px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 20px;
            border-radius: 20px;
            margin: 15px auto 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            max-width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #word-lines-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .word-line {
            display: flex;
            gap: 8px;
        }
        .letter-box {
            width: 35px;
            height: 35px;
            border-bottom: 3px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: transparent;
            transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
        }
        .letter-box.solved {
            color: #ffeb3b;
            border-bottom-color: #ffeb3b;
            animation: pop 0.3s ease;
        }
        #wheel-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            pointer-events: none;
        }
        #wheel {
            position: relative;
            width: 220px;
            height: 220px;
            background: rgba(255, 255, 255, 0.15);
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 2;
            touch-action: none;
            cursor: pointer;
        }
        .letter-node {
            position: absolute;
            width: 50px;
            height: 50px;
            background: white;
            color: #4e4376;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, background 0.1s ease;
            pointer-events: none;
        }
        .letter-node.selected {
            background: #ffeb3b;
            color: #333;
            transform: translate(-50%, -50%) scale(1.2);
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>ConnectTheWord</h1>
        <div class="subtitle">By Datorg</div>
        <div id="level-indicator">Level 1</div>
        <div id="current-word"></div>
    </header>

    <div id="word-lines-container"></div>

    <div id="wheel-container">
        <canvas id="canvas"></canvas>
        <div id="wheel"></div>
    </div>

    <script>
        // --- 10 DYNAMIC LEVELS DATABASE ---
        const gameLevels = [
            { levelNum: 1, letters: ['C', 'A', 'T', 'O'], targetWords: ["CAT", "ACT", "COAT", "TACO"] },
            { levelNum: 2, letters: ['E', 'A', 'R', 'T'], targetWords: ["ART", "EAR", "RATE", "TEAR"] },
            { levelNum: 3, letters: ['L', 'I', 'V', 'E'], targetWords: ["LIE", "VEIL", "EVIL", "LIVE"] },
            { levelNum: 4, letters: ['S', 'T', 'O', 'P'], targetWords: ["TOP", "STOP", "POST", "POTS"] },
            { levelNum: 5, letters: ['C', 'A', 'M', 'P'], targetWords: ["AMP", "CAP", "MAP", "CAMP"] },
            { levelNum: 6, letters: ['B', 'A', 'K', 'E'], targetWords: ["BAKE", "BEAK"] },
            { levelNum: 7, letters: ['L', 'A', 'M', 'P'], targetWords: ["LAP", "MAP", "LAMP", "PALM"] },
            { levelNum: 8, letters: ['N', 'O', 'T', 'E'], targetWords: ["NET", "TEN", "NOTE", "TONE"] },
            { levelNum: 9, letters: ['F', 'L', 'O', 'W'], targetWords: ["LOW", "FLOW", "WOLF", "FOWL"] },
            { levelNum: 10, letters: ['D', 'E', 'A', 'R'], targetWords: ["RED", "EAR", "DARE", "DEAR", "READ"] }
        ];

        // --- TRACKING PROGRESSION ---
        let currentLevelIndex = 0;
        
        const savedLevel = localStorage.getItem('datorg_connect_word_level');
        if (savedLevel && parseInt(savedLevel) <= gameLevels.length) {
            currentLevelIndex = parseInt(savedLevel) - 1;
        }

        let currentLevel = gameLevels[currentLevelIndex];
        let solvedWords = [];
        let selectedNodes = [];
        let isDrawing = false;
        let currentTouchPos = { x: 0, y: 0 };
        const nodes = [];

        // --- DOM ELEMENTS ---
        const linesContainer = document.getElementById('word-lines-container');
        const wheel = document.getElementById('wheel');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const currentWordDisplay = document.getElementById('current-word');
        const levelIndicator = document.getElementById('level-indicator');

        // --- GENERATE BOARD CONTROLLER ---
        function initLevel() {
            currentLevel = gameLevels[currentLevelIndex];
            solvedWords = [];
            
            levelIndicator.innerText = `Level ${currentLevel.levelNum}`;
            currentWordDisplay.innerText = "";
            linesContainer.innerHTML = '';

            // Generate word layout rows
            currentLevel.targetWords.forEach((word) => {
                const lineElement = document.createElement('div');
                lineElement.classList.add('word-line');
                lineElement.dataset.word = word;

                for (let i = 0; i < word.length; i++) {
                    const letterBox = document.createElement('div');
                    letterBox.classList.add('letter-box');
                    letterBox.innerText = word[i];
                    lineElement.appendChild(letterBox);
                }
                linesContainer.appendChild(lineElement);
            });

            // Build Wheel Structure
            wheel.innerHTML = '';
            nodes.length = 0; 
            const centerX = 110;
            const centerY = 110;
            const radius = 75;

            currentLevel.letters.forEach((letter, index) => {
                const angle = (index * 2 * Math.PI) / currentLevel.letters.length - Math.PI / 2;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                const node = document.createElement('div');
                node.classList.add('letter-node');
                node.innerText = letter;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                wheel.appendChild(node);

                nodes.push({ element: node, letter: letter, x: x, y: y });
            });

            resizeCanvas();
        }

        function resizeCanvas() {
            canvas.width = wheel.offsetWidth + 80;
            canvas.height = wheel.offsetHeight + 80;
        }
        window.addEventListener('resize', resizeCanvas);

        // --- INPUT ROUTING ---
        wheel.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            handleMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        window.addEventListener('touchend', () => { handleEnd(); });

        wheel.addEventListener('mousedown', (e) => {
            e.preventDefault();
            handleStart(e.clientX, e.clientY);
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            handleMove(e.clientX, e.clientY);
        });

        window.addEventListener('mouseup', () => { handleEnd(); });

        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function handleStart(clientX, clientY) {
            isDrawing = true;
            checkCollision(clientX, clientY);
        }

        function handleMove(clientX, clientY) {
            currentTouchPos = getCanvasCoords(clientX, clientY);
            checkCollision(clientX, clientY);
            drawLines();
        }

        function handleEnd() {
            if (!isDrawing) return;
            isDrawing = false;

            const finalWord = selectedNodes.map(n => n.letter).join('');
            checkWordSubmit(finalWord);

            selectedNodes.forEach(n => n.element.classList.remove('selected'));
            selectedNodes = [];
            currentWordDisplay.innerText = "";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function checkCollision(clientX, clientY) {
            const wheelRect = wheel.getBoundingClientRect();
            const localX = clientX - wheelRect.left;
            const localY = clientY - wheelRect.top;

            nodes.forEach(node => {
                const dist = Math.hypot(node.x - localX, node.y - localY);
                if (dist < 28 && !selectedNodes.includes(node)) {
                    selectedNodes.push(node);
                    node.element.classList.add('selected');
                    currentWordDisplay.innerText = selectedNodes.map(n => n.letter).join('');
                    if (navigator.vibrate) navigator.vibrate(15);
                }
            });
        }

        function drawLines() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (selectedNodes.length === 0) return;

            const canvasRect = canvas.getBoundingClientRect();
            const wheelRect = wheel.getBoundingClientRect();
            const offsetX = wheelRect.left - canvasRect.left;
            const offsetY = wheelRect.top - canvasRect.top;

            ctx.lineWidth = 10;
            ctx.strokeStyle = "rgba(255, 235, 59, 0.8)";
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            ctx.beginPath();
            selectedNodes.forEach((node, idx) => {
                const nx = node.x + offsetX;
                const ny = node.y + offsetY;
                if (idx === 0) ctx.moveTo(nx, ny);
                else ctx.lineTo(nx, ny);
            });

            if (isDrawing && selectedNodes.length > 0) {
                ctx.lineTo(currentTouchPos.x, currentTouchPos.y);
            }
            ctx.stroke();
        }

        function checkWordSubmit(word) {
            const hasMatch = currentLevel.targetWords.includes(word);
            
            if (hasMatch && !solvedWords.includes(word)) {
                solvedWords.push(word);
                
                // Find matching row and reveal letters
                const matchingLine = linesContainer.querySelector(`[data-word="${word}"]`);
                if (matchingLine) {
                    const boxes = matchingLine.querySelectorAll('.letter-box');
                    boxes.forEach((box, index) => {
                        setTimeout(() => {
                            box.classList.add('solved');
                        }, index * 80);
                    });
                }

                // Check level conditions
                if (solvedWords.length === currentLevel.targetWords.length) {
                    setTimeout(() => {
                        if (currentLevelIndex < gameLevels.length - 1) {
                            alert("Level Complete! 🎉 Proceeding to next round.");
                            currentLevelIndex++;
                            localStorage.setItem('datorg_connect_word_level', currentLevelIndex + 1);
                            initLevel();
                        } else {
                            alert("Mastery Attained! You finished all 10 levels of ConnectTheWord! 🏆");
                            currentLevelIndex = 0;
                            localStorage.setItem('datorg_connect_word_level', 1);
                            initLevel();
                        }
                    }, 800);
                }
            }
        }

        initLevel();
    </script>
</body>
</html>
